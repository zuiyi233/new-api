root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/new-api-dev.exe ."
bin = "./tmp/air/new-api-dev.exe"
full_bin = "./tmp/air/new-api-dev.exe --log-dir ./logs/dev-local"
include_ext = ["go"]
exclude_dir = ["web", "node_modules", "logs", "data", "tmp", ".git"]
exclude_regex = ["_test.go"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true
